services:
  postgres:
    image: postgres:16-alpine
    container_name: secure-deploy-postgres
    environment:
      POSTGRES_DB: secure_deploy
      POSTGRES_USER: secure
      POSTGRES_PASSWORD: secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secure -d secure_deploy"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
